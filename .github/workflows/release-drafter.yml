name: Release Drafter

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@139054aeaa9adc52ab36ddf67437541f039b88e2 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
